
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Management QuickPlan{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="topbar-left">
                <div class="branding">
                    <h1>Management QuickPlan</h1>
                </div>

                <div class="project-switcher">
                    <form method="POST"
                        action="{{ url_for('main.select_project') }}"
                        class="project-select-form">
                        <label for="project-select">Project:</label>

                        <select id="project-select"
                                name="project_id"
                                onchange="this.form.submit()">
                            {% for project_item in available_projects %}
                                <option value="{{ project_item.project_id }}"
                                    {% if selected_project and project_item.project_id|string == selected_project.project_id|string %}selected{% endif %}>
                                    {{ project_item.project_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </form>

                    <form method="POST"
                        action="{{ url_for('main.new_project') }}"
                        class="project-action-form">
                        <button type="submit" class="project-icon-btn" title="Add New Project">
                            +
                        </button>
                    </form>

                    <form method="POST"
                        action="{{ url_for('main.delete_current_project') }}"
                        class="project-action-form"
                        onsubmit="return confirm('Delete this project and all of its related records?');">
                        <button type="submit"
                                class="project-icon-btn danger"
                                title="Delete Current Project"
                                {% if available_projects|length <= 1 %}disabled{% endif %}>
                            −
                        </button>
                    </form>
                </div>
            </div>

            <div class="topbar-right">
                <a href="{{ url_for('main.user_profile') }}" class="topbar-btn">
                    <i class="fa-solid fa-user"></i> User
                </a>
                <a href="{{ url_for('main.logout') }}" class="topbar-btn logout">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </a>
            </div>
        </header>

        <div class="app-body">
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <a href="{{ url_for('main.dashboard') }}"
                       class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                        <i class="fa-solid fa-table-columns"></i>
                        <span>Dashboard</span>
                    </a>

                    <a href="{{ url_for('main.project_info') }}"
                       class="nav-item {% if active_page == 'project_info' %}active{% endif %}">
                        <i class="fa-regular fa-folder"></i>
                        <span>Project Info</span>
                    </a>

                    <a href="{{ url_for('main.effort_logs') }}"
                       class="nav-item {% if active_page == 'effort_logs' %}active{% endif %}">
                        <i class="fa-regular fa-clock"></i>
                        <span>Effort Log</span>
                    </a>

                    <a href="{{ url_for('main.requirements') }}"
                       class="nav-item {% if active_page == 'requirements' %}active{% endif %}">
                        <i class="fa-regular fa-file-lines"></i>
                        <span>Requirements</span>
                    </a>

                    <a href="{{ url_for('main.reports') }}"
                       class="nav-item {% if active_page == 'reports' %}active{% endif %}">
                        <i class="fa-solid fa-chart-column"></i>
                        <span>Reports</span>
                    </a>
                </nav>
            </aside>

            <main class="main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

{% block scripts %}{% endblock %}

</body>
</html>
